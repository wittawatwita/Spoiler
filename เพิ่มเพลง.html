<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoundFlow — เพิ่มเพลงใหม่</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #121212;
    --bg-secondary: #181818;
    --bg-tertiary: #282828;
    --text-primary: #ffffff;
    --text-secondary: #b3b3b3;
    --text-tertiary: #6a6a6a;
    --accent: #1DB954;
    --accent-hover: #1ed760;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.15);
    --radius-sm: 4px;
    --radius-md: 8px;
    --radius-lg: 12px;
    --sidebar-width: 240px;
    --player-height: 90px;
    --mobile-player-height: 64px;
    --mobile-nav-height: 60px;
    --font: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: var(--font);
    font-size: 14px;
    overflow: hidden;
  }

  /* ══════════════════════════════
     DESKTOP LAYOUT
  ══════════════════════════════ */
  .app {
    display: grid;
    grid-template-columns: var(--sidebar-width) 1fr;
    grid-template-rows: 1fr var(--player-height);
    height: 100vh;
  }

  /* ─── Sidebar (Common) ─── */
  .sidebar {
    grid-row: 1 / 2; background: #000; border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .sidebar-logo { padding: 24px 20px 16px; display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .logo-icon i { font-size: 15px; color: #000; }
  .logo-text { font-size: 16px; font-weight: 700; }
  
  .sidebar-nav { padding: 0 12px 8px; }
  .nav-item {
    display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: var(--radius-md);
    cursor: pointer; transition: background 0.15s; text-decoration: none; color: inherit; margin-bottom: 2px;
  }
  .nav-item:hover { background: var(--bg-tertiary); }
  .nav-item.active { background: var(--bg-tertiary); }
  .nav-item i { font-size: 20px; color: var(--text-secondary); }
  .nav-item.active i, .nav-item.active span { color: var(--text-primary); }
  .nav-item span { font-size: 13px; font-weight: 500; color: var(--text-secondary); }

  /* ─── Main Content ─── */
  .main {
    grid-column: 2; overflow-y: auto; background: var(--bg-primary);
    scrollbar-width: thin; scrollbar-color: var(--bg-tertiary) transparent;
  }
  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 3px; }

  /* Header */
  .main-header {
    position: sticky; top: 0; z-index: 10;
    background: rgba(18,18,18,0.9); backdrop-filter: blur(12px);
    padding: 16px 28px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .header-left { font-size: 16px; font-weight: 700; }

  /* ─── Upload Form Container ─── */
  .upload-container { padding: 28px; max-width: 800px; margin: 0 auto; }

  /* Drag & Drop Zone */
  .drop-zone {
    border: 2px dashed var(--border); background: var(--bg-secondary);
    border-radius: var(--radius-lg); padding: 40px 20px; text-align: center;
    cursor: pointer; transition: border-color 0.2s, background 0.2s;
    margin-bottom: 28px; display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  .drop-zone:hover, .drop-zone.dragover { border-color: var(--accent); background: rgba(29,185,84,0.02); }
  .drop-zone i { font-size: 48px; color: var(--text-secondary); }
  .drop-zone .main-text { font-size: 15px; font-weight: 600; color: #fff; }
  .drop-zone .sub-text { font-size: 12px; color: var(--text-tertiary); }

  /* Form Layout Splits */
  .form-split { display: flex; gap: 28px; margin-bottom: 24px; }
  
  /* Left side: Cover Image Picker */
  .cover-picker-box {
    width: 160px; height: 160px; border: 1px solid var(--border);
    background: var(--bg-secondary); border-radius: var(--radius-md);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; cursor: pointer; transition: background 0.2s; flex-shrink: 0;
  }
  .cover-picker-box:hover { background: var(--bg-tertiary); border-color: var(--text-tertiary); }
  .cover-picker-box i { font-size: 28px; color: var(--text-secondary); }
  .cover-picker-box span { font-size: 11px; color: var(--text-secondary); font-weight: 500; }

  /* Right side: Meta inputs */
  .meta-fields { flex: 1; display: flex; flex-direction: column; gap: 16px; }
  .input-block { display: flex; flex-direction: column; gap: 6px; }
  .input-label { font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
  
  .form-input {
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: var(--radius-md); padding: 10px 14px; color: #fff;
    font-family: var(--font); font-size: 14px; outline: none; transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--accent); background: var(--bg-tertiary); }
  
  .form-select {
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: var(--radius-md); padding: 10px 14px; color: #fff;
    font-family: var(--font); font-size: 14px; outline: none; cursor: pointer;
  }

  /* Upload Progress Bar */
  .progress-section {
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: var(--radius-md); padding: 14px; margin-bottom: 24px;
    display: none; /* เปิดด้วย JS เมื่อเลือกไฟล์ */
  }
  .progress-info { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; }
  .progress-bar { height: 4px; background: var(--bg-tertiary); border-radius: 2px; overflow: hidden; }
  .progress-fill { width: 70%; height: 100%; background: var(--accent); border-radius: 2px; }

  /* Actions Buttons */
  .action-buttons { display: flex; justify-content: flex-end; gap: 12px; border-top: 1px solid var(--border); padding-top: 20px; }
  .btn {
    padding: 10px 28px; font-size: 13px; font-weight: 700; border-radius: 24px;
    cursor: pointer; border: none; transition: transform 0.1s;
  }
  .btn.back { background: transparent; color: #fff; }
  .btn.back:hover { background: rgba(255,255,255,0.05); }
  .btn.submit { background: var(--accent); color: #000; }
  .btn.submit:hover { background: var(--accent-hover); transform: scale(1.02); }

  /* Hidden Inputs */
  input[type="file"] { display: none; }

  /* ─── Player Bar (Common Desktop) ─── */
  .player-bar {
    grid-column: 1 / 3; background: #0a0a0a; border-top: 1px solid var(--border);
    display: grid; grid-template-columns: 280px 1fr 220px; align-items: center; padding: 0 24px;
  }
  .player-left { color: var(--text-secondary); font-size: 12px; }

  /* Mobile elements hidden on desktop */
  .mobile-player { display: none; }
  .bottom-nav { display: none; }

  /* ══════════════════════════════
     MOBILE RESPONSIVE ≤ 768px
  ══════════════════════════════ */
  @media (max-width: 768px) {
    .app { grid-template-columns: 1fr; grid-template-rows: 1fr var(--mobile-nav-height); height: 100vh; }
    .sidebar, .player-bar { display: none; }
    .main { grid-column: 1; grid-row: 1 / 2; padding-bottom: 40px; }

    .main-header { padding: 12px 16px; }
    .upload-container { padding: 16px; }
    
    .drop-zone { padding: 24px 16px; }
    .form-split { flex-direction: column; align-items: center; gap: 20px; }
    .cover-picker-box { width: 140px; height: 140px; }
    .meta-fields { width: 100%; }
    
    .action-buttons { justify-content: stretch; }
    .btn { flex: 1; text-align: center; }

    /* Mobile Common Component Mock */
    .mobile-player { display: flex; align-items: center; position: fixed; bottom: var(--mobile-nav-height); left: 0; right: 0; height: var(--mobile-player-height); background: #1e1e1e; border-top: 1px solid var(--border); padding: 0 14px; gap: 10px; z-index: 100; }
    .mp-progress { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--bg-tertiary); }
    .mp-progress-fill { width: 45%; height: 100%; background: var(--accent); }
    .mp-img { width: 42px; height: 42px; border-radius: var(--radius-sm); background: #2d6a9f; display: flex; align-items: center; justify-content: center; }
    .mp-img i { font-size: 18px; color: #fff; }
    .mp-meta { flex: 1; min-width: 0; }
    .mp-meta .name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mp-meta .artist { font-size: 11px; color: var(--text-secondary); }
    .mp-controls i { font-size: 20px; color: var(--text-primary); }

    .bottom-nav { display: flex; position: fixed; bottom: 0; left: 0; right: 0; height: var(--mobile-nav-height); background: #000; border-top: 1px solid var(--border); z-index: 101; }
    .bn-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; text-decoration: none; color: inherit; }
    .bn-item i { font-size: 22px; color: var(--text-tertiary); }
    .bn-item span { font-size: 10px; color: var(--text-tertiary); }
    .bn-item.active i, .bn-item.active span { color: var(--text-primary); }
  }
</style>
</head>
<body>

<div class="app">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon"><i class="ti ti-player-play"></i></div>
      <span class="logo-text">SoundFlow</span>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-item"><i class="ti ti-home"></i><span>หน้าแรก</span></a>
      <a href="ค้นหาเพลง.html" class="nav-item"><i class="ti ti-search"></i><span>ค้นหา</span></a>
      <a href="คลังเพลง.html" class="nav-item active"><i class="ti ti-library"></i><span>คลังเพลง</span></a>
    </nav>
  </aside>

  <main class="main">
    <header class="main-header">
      <div class="header-left">เพิ่มเพลงใหม่ลงระบบ</div>
    </header>

    <div class="upload-container">
      
      <div class="drop-zone" id="audioDropZone" onclick="document.getElementById('audioFileInput').click()">
        <i class="ti ti-cloud-upload"></i>
        <span class="main-text" id="audioZoneText">ลากไฟล์เสียงมาวางที่นี่ หรือคลิกเพื่อเลือกไฟล์</span>
        <span class="sub-text">รองรับไฟล์ MP3, WAV, M4A (สูงสุด 25MB)</span>
        <input type="file" id="audioFileInput" accept="audio/*" onchange="handleAudioSelect(this)">
      </div>

      <div class="progress-section" id="uploadProgressSection">
        <div class="progress-info">
          <span id="fileNameText">filename.mp3</span>
          <span style="color: var(--accent);">กำลังอัปโหลด 70%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill"></div></div>
      </div>

      <div class="form-split">
        
        <div class="cover-picker-box" title="เลือกรูปภาพปกเพลง" id="coverPickerBox" onclick="document.getElementById('coverFileInput').click()">
          <i class="ti ti-music-photo" id="coverIcon"></i>
          <span id="coverText">อัปโหลดรูปปก</span>
          <input type="file" id="coverFileInput" accept="image/*" onchange="handleCoverSelect(this)">
        </div>

        <div class="meta-fields">
          <div class="input-block">
            <label class="input-label">ชื่อเพลง</label>
            <input type="text" class="form-input" id="songNameInput" placeholder="ระบุชื่อเพลงของคุณ (ถ้าไม่ระบุ จะใช้ชื่อไฟล์เสียงแทน)" autocomplete="off">
          </div>
          
          <div class="input-block">
            <label class="input-label">ศิลปิน</label>
            <input type="text" class="form-input" id="artistInput" placeholder="ระบุชื่อศิลปิน (ไม่บังคับ)" autocomplete="off">
          </div>

          <div class="input-block">
            <label class="input-label">อัลบั้ม (ไม่บังคับ)</label>
            <input type="text" class="form-input" id="albumInput" placeholder="ซิงเกิลเดี่ยว หรือระบุชื่ออัลบั้ม" autocomplete="off">
          </div>

          <div class="input-block">
            <label class="input-label">แนวเพลง (Genre)</label>
            <select class="form-input form-select" id="genreInput">
              <option value="pop">ป๊อป (Pop)</option>
              <option value="thai-indie">ไทยอินดี้ (Thai Indie)</option>
              <option value="hiphop">ฮิปฮอป / แร็พ (Hip Hop / Rap)</option>
              <option value="rock">ร็อก (Rock)</option>
              <option value="lofi">โลไฟ (Lo-Fi)</option>
            </select>
          </div>
        </div>

      </div>

      <div class="action-buttons">
        <button class="btn back" onclick="history.back()">ย้อนกลับ</button>
        <button class="btn submit" onclick="submitSongData()">ปล่อยเพลงเลย</button>
      </div>

    </div>
  </main>

  <footer class="player-bar">
    <div class="player-left">Mini Player Component Placeholder</div>
  </footer>

</div>
<nav class="bottom-nav">
  <a href="index.html" class="bn-item">
    <i class="ti ti-home"></i>
    <span>หน้าแรก</span>
  </a>
  <a href="ค้นหาเพลง.html" class="bn-item">
    <i class="ti ti-search"></i>
    <span>ค้นหา</span>
  </a>
  <a href="คลังเพลง.html" class="bn-item active">
    <i class="ti ti-library"></i>
    <span>คลัง</span>
  </a>
</nav>

<script>
  let selectedAudioFile = null;
  let selectedCoverImage = null;
  let db = null;

  // เปิด IndexedDB สำหรับเก็บไฟล์เสียง
  const dbRequest = indexedDB.open('SoundFlowDB', 1);
  
  dbRequest.onerror = () => {
    console.error('ไม่สามารถเปิด IndexedDB');
  };
  
  dbRequest.onsuccess = (event) => {
    db = event.target.result;
  };
  
  dbRequest.onupgradeneeded = (event) => {
    db = event.target.result;
    if (!db.objectStoreNames.contains('songs')) {
      db.createObjectStore('songs', { keyPath: 'id', autoIncrement: true });
    }
  };

  // ฟังก์ชันจัดการเมื่อเลือกรูปปกเพลง แสดงข้อมูลรูปภาพ
  function handleCoverSelect(input) {
    if(input.files && input.files[0]) {
      const file = input.files[0];
      const validTypes = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];
      const maxSize = 5 * 1024 * 1024;
      
      if(!validTypes.includes(file.type)) {
        alert('กรุณาเลือกไฟล์รูปภาพ (JPG, PNG, GIF, WebP)');
        return;
      }
      
      if(file.size > maxSize) {
        alert('ไฟล์รูปภาพต้องไม่เกิน 5MB');
        return;
      }
      
      const fileTypeMap = {
        'image/jpeg': 'JPEG',
        'image/png': 'PNG',
        'image/gif': 'GIF',
        'image/webp': 'WebP'
      };
      
      const fileType = fileTypeMap[file.type] || file.type.split('/')[1].toUpperCase();
      const fileSizeMB = (file.size / (1024 * 1024)).toFixed(2);
      
      const reader = new FileReader();
      reader.onload = function(e) {
        selectedCoverImage = e.target.result;
        const box = document.getElementById('coverPickerBox');
        box.style.backgroundImage = `url('${selectedCoverImage}')`;
        box.style.backgroundSize = 'cover';
        box.style.backgroundPosition = 'center';
        document.getElementById('coverIcon').style.display = 'none';
        
        document.getElementById('coverText').innerHTML = `
          ✓ ${file.name.substring(0, 20)}${file.name.length > 20 ? '...' : ''}<br>
          <span style="font-size: 10px; color: var(--text-tertiary);">${fileType} • ${fileSizeMB} MB</span>
        `;
        document.getElementById('coverText').style.color = 'var(--accent)';
        document.getElementById('coverText').style.textAlign = 'center';
        document.getElementById('coverText').style.fontSize = '10px';
      };
      reader.readAsDataURL(file);
    }
  }

  // ตัดนามสกุลไฟล์ออก เพื่อใช้เป็นชื่อเพลงอัตโนมัติเวลาไม่ได้กรอกชื่อเพลง
  function stripFileExtension(filename) {
    const idx = filename.lastIndexOf('.');
    return idx > 0 ? filename.substring(0, idx) : filename;
  }

  /* ⚠️ FIX (เครื่องเก่า: เล่นไม่ออกเสียงเลย ทั้งที่ canplay fire สำเร็จ):
     เบราว์เซอร์มือถือรุ่นเก่าบางตัว (รวมถึง MIUI Browser บางเวอร์ชัน)
     อ่าน file.type ของไฟล์ MP3 ผิดพลาด — บางครั้งคืนค่าว่าง หรือคืนเป็น
     "application/octet-stream" แทนที่จะเป็น "audio/mpeg" พอเอาค่านี้ไป
     สร้าง Blob ตอนเล่นเพลง เบราว์เซอร์จะมองว่าพร้อมเล่น (canplay fire)
     แต่ตัวถอดรหัสเสียงจริงไม่รู้ว่าต้อง decode เป็นเสียงแบบไหน เลยไม่มี
     เสียงออกมาเลยแบบเงียบ ๆ ไม่มี error ใด ๆ

     วิธีแก้: ไม่พึ่ง file.type จากเบราว์เซอร์เลย กำหนด MIME type เองจาก
     นามสกุลไฟล์เสมอ ซึ่งแม่นยำกว่าและเบราว์เซอร์ทุกตัวเข้าใจตรงกัน */
  function getMimeTypeFromFilename(filename) {
    const ext = filename.toLowerCase().substring(filename.lastIndexOf('.'));
    const mimeMap = {
      '.mp3':  'audio/mpeg',
      '.wav':  'audio/wav',
      '.m4a':  'audio/mp4',
      '.ogg':  'audio/ogg',
      '.flac': 'audio/flac',
      '.webm': 'audio/webm',
      '.aac':  'audio/aac'
    };
    return mimeMap[ext] || 'audio/mpeg';
  }

  // ฟังก์ชันจัดการเลือกไฟล์เสียง พร้อมการตรวจสอบ
  function handleAudioSelect(input) {
    if(input.files && input.files[0]) {
      const file = input.files[0];
      
      // ตรวจสอบรองรับ format
      const supportedFormats = ['audio/mpeg', 'audio/wav', 'audio/mp4', 'audio/ogg', 'audio/flac', 'audio/webm', 'audio/aac'];
      const fileType = file.type;
      
      // ตรวจสอบจากนามสกุลไฟล์ด้วย
      const filename = file.name.toLowerCase();
      const supportedExtensions = ['.mp3', '.wav', '.m4a', '.ogg', '.flac', '.webm', '.aac'];
      const hasValidExtension = supportedExtensions.some(ext => filename.endsWith(ext));
      
      if(!supportedFormats.includes(fileType) && !hasValidExtension) {
        alert('❌ ไฟล์นี้ไม่รองรับ\n\nรองรับ: MP3, WAV, M4A, OGG, FLAC, WebM, AAC');
        input.value = '';
        return;
      }
      
      // ตรวจสอบขนาด (max 100MB สำหรับ IndexedDB)
      if(file.size > 100 * 1024 * 1024) {
        alert('❌ ไฟล์เสียงต้องไม่เกิน 100MB');
        input.value = '';
        return;
      }
      
      selectedAudioFile = file;
      const fileSizeMB = (file.size / (1024 * 1024)).toFixed(2);
      document.getElementById('fileNameText').innerText = `${file.name} (${fileSizeMB}MB)`;
      document.getElementById('audioZoneText').innerText = `✓ เลือกไฟล์สำเร็จ: ${file.name}`;
      document.getElementById('uploadProgressSection').style.display = 'block';

      // ถ้าช่อง "ชื่อเพลง" ยังว่างอยู่ ให้เติมชื่อไฟล์ (ตัดนามสกุล) ให้อัตโนมัติทันที
      const songNameInput = document.getElementById('songNameInput');
      if (songNameInput && !songNameInput.value.trim()) {
        songNameInput.value = stripFileExtension(file.name);
      }
    }
  }

  // ระบบ Drag & Drop Event สำหรับพื้นที่วางไฟล์เสียง
  const zone = document.getElementById('audioDropZone');
  zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', (e) => {
    e.preventDefault();
    zone.classList.remove('dragover');
    if(e.dataTransfer.files.length) {
      document.getElementById('audioFileInput').files = e.dataTransfer.files;
      handleAudioSelect(document.getElementById('audioFileInput'));
    }
  });

  // 🌟 ฟังก์ชันหลักในการบันทึกข้อมูลเพลงแบบถาวรลงระบบ
  function submitSongData() {
    if(!selectedAudioFile) {
      alert('🎵 กรุณาเลือกไฟล์เสียงด้วยครับ!');
      return;
    }

    // อ่านชื่อเพลงจากช่องกรอก ถ้าว่างให้ใช้ชื่อไฟล์เสียงแทนโดยอัตโนมัติ
    const songNameInput = document.getElementById('songNameInput');
    let songName = songNameInput?.value.trim() || '';
    if (!songName) {
      songName = stripFileExtension(selectedAudioFile.name);
      if (songNameInput) songNameInput.value = songName;
    }

    // ศิลปิน ไม่บังคับกรอก ถ้าว่างจะใส่ "Unknown Artist" ให้
    const artist = document.getElementById('artistInput')?.value.trim() || 'Unknown Artist';
    const album = document.getElementById('albumInput')?.value.trim() || 'ซิงเกิลเดี่ยว';

    if(!db) {
      alert('❌ ฐานข้อมูลไม่พร้อม กรุณาลองใหม่');
      return;
    }

    // แสดง loading indicator
    const originalText = event.target.innerText;
    event.target.innerText = '⏳ กำลังอัปโหลด...';
    event.target.disabled = true;

    // อ่านไฟล์เสียง
    const reader = new FileReader();
    reader.onload = function(e) {
      const audioArrayBuffer = e.target.result;

      // ใช้ MIME type ที่อนุมานจากนามสกุลไฟล์เสมอ แทน selectedAudioFile.type
      // เพราะเบราว์เซอร์มือถือบางตัวอ่าน file.type ของ MP3 ผิดพลาด
      const correctMimeType = getMimeTypeFromFilename(selectedAudioFile.name);

      // คำนวณระยะเวลาเพลง
      const audio = new Audio();
      const blob = new Blob([audioArrayBuffer], { type: correctMimeType });
      const audioURL = URL.createObjectURL(blob);
      audio.src = audioURL;
      
      let duration = '0:00';
      let metadataLoaded = false;
      
      const metadataTimeout = setTimeout(() => {
        if(!metadataLoaded) {
          saveSongToDB();
        }
      }, 3000);
      
      audio.addEventListener('loadedmetadata', function() {
        clearTimeout(metadataTimeout);
        if(!metadataLoaded) {
          metadataLoaded = true;
          const minutes = Math.floor(audio.duration / 60);
          const seconds = Math.floor(audio.duration % 60);
          duration = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
          saveSongToDB();
        }
      });

      audio.addEventListener('error', () => {
        clearTimeout(metadataTimeout);
        if(!metadataLoaded) {
          metadataLoaded = true;
          console.warn('ไม่สามารถอ่าน metadata แต่จะบันทึกเพลงเลย');
          saveSongToDB();
        }
      });
      
      function saveSongToDB() {
        URL.revokeObjectURL(audioURL);
        
        const songData = {
          name: songName,
          artist: artist,
          album: album,
          duration: duration,
          audioFile: audioArrayBuffer,
          audioFileName: selectedAudioFile.name,
          audioType: correctMimeType,
          coverImage: selectedCoverImage || null,
          uploadedAt: new Date().toISOString()
        };
        
        const transaction = db.transaction(['songs'], 'readwrite');
        const objectStore = transaction.objectStore('songs');
        const addRequest = objectStore.add(songData);
        
        addRequest.onsuccess = () => {
          // บันทึก metadata ใน localStorage ด้วย (เพื่อแสดง UI)
          let uploadedSongs = JSON.parse(localStorage.getItem('uploadedSongs')) || [];
          uploadedSongs.push({
            name: songName,
            artist: artist,
            album: album,
            duration: duration,
            fileName: selectedAudioFile.name,
            uploadedAt: new Date().toISOString()
          });
          localStorage.setItem('uploadedSongs', JSON.stringify(uploadedSongs));

          // 🔧 FIX: บันทึกรูปปกลง localStorage ด้วย key cover_<ชื่อเพลง>_<ศิลปิน>
          // เพื่อให้หน้า index.html (Hero Section / Player Bar) ที่อ่านผ่าน getCoverSrc()
          // หารูปเจอทันที โดยไม่ต้องพึ่งพา IndexedDB เพียงอย่างเดียว
          if (selectedCoverImage) {
            try {
              localStorage.setItem(`cover_${songName}_${artist}`, selectedCoverImage);
            } catch (storageErr) {
              // ถ้ารูปใหญ่เกินจน localStorage เต็ม ก็ไม่ต้องให้การอัปโหลดเพลงล้มเหลวไปด้วย
              console.warn('ไม่สามารถบันทึกรูปปกลง localStorage (อาจมีขนาดใหญ่เกินไป):', storageErr);
            }
          }

          event.target.innerText = originalText;
          event.target.disabled = false;
          alert('✅ อัปโหลดเพลงเข้าสู่ระบบ SoundFlow เรียบร้อย!');
          window.location.href = 'index.html';
        };
        
        addRequest.onerror = () => {
          event.target.innerText = originalText;
          event.target.disabled = false;
          alert('❌ เกิดข้อผิดพลาดในการบันทึกเพลง');
        };
      }
    };

    reader.onerror = function() {
      event.target.innerText = originalText;
      event.target.disabled = false;
      alert('❌ เกิดข้อผิดพลาดในการอ่านไฟล์เสียง กรุณาลองใหม่');
    };
    
    reader.readAsArrayBuffer(selectedAudioFile);
  }
</script>
