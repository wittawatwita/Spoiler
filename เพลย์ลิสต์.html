<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoundFlow — สร้างเพลย์ลิสต์ใหม่</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #121212;
    --bg-secondary: #181818;
    --bg-tertiary: #282828;
    --text-primary: #ffffff;
    --text-secondary: #b3b3b3;
    --text-tertiary: #6a6a6a;
    --accent: #1DB954;
    --accent-hover: #1ed760;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.15);
    --radius-sm: 4px;
    --radius-md: 8px;
    --radius-lg: 12px;
    --sidebar-width: 240px;
    --player-height: 90px;
    --mobile-player-height: 64px;
    --mobile-nav-height: 60px;
    --font: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  html, body { height: 100%; background: var(--bg-primary); color: var(--text-primary); font-family: var(--font); font-size: 14px; overflow: hidden; }

  .app { display: grid; grid-template-columns: var(--sidebar-width) 1fr; grid-template-rows: 1fr var(--player-height); height: 100vh; }

  .sidebar { grid-row: 1 / 2; background: #000; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-logo { padding: 24px 20px 16px; display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .logo-icon i { font-size: 15px; color: #000; }
  .logo-text { font-size: 16px; font-weight: 700; }
  .sidebar-nav { padding: 0 12px 8px; }
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: var(--radius-md); cursor: pointer; transition: background 0.15s; text-decoration: none; color: inherit; margin-bottom: 2px; }
  .nav-item:hover { background: var(--bg-tertiary); }
  .nav-item.active { background: var(--bg-tertiary); }
  .nav-item i { font-size: 20px; color: var(--text-secondary); }
  .nav-item.active i, .nav-item.active span { color: var(--text-primary); }
  .nav-item span { font-size: 13px; font-weight: 500; color: var(--text-secondary); }

  .main { grid-column: 2; overflow-y: auto; background: var(--bg-primary); scrollbar-width: thin; scrollbar-color: var(--bg-tertiary) transparent; }
  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 3px; }

  .main-header { position: sticky; top: 0; z-index: 10; background: rgba(18,18,18,0.9); backdrop-filter: blur(12px); padding: 16px 28px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  .header-left { font-size: 16px; font-weight: 700; }

  .form-section { padding: 28px; }

  .playlist-meta-box { display: flex; gap: 28px; background: var(--bg-secondary); padding: 24px; border-radius: var(--radius-lg); border: 1px solid var(--border); margin-bottom: 32px; }

  /* Cover Upload */
  .upload-cover-wrap { width: 180px; height: 180px; border: 2px dashed var(--border); border-radius: var(--radius-md); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; cursor: pointer; transition: background 0.2s, border-color 0.2s; background: rgba(255,255,255,0.01); flex-shrink: 0; overflow: hidden; position: relative; }
  .upload-cover-wrap:hover { background: rgba(255,255,255,0.04); border-color: var(--text-tertiary); }
  .upload-cover-wrap i { font-size: 36px; color: var(--text-secondary); }
  .upload-cover-wrap span { font-size: 12px; color: var(--text-secondary); font-weight: 500; }
  .upload-cover-wrap img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: var(--radius-md); }
  .upload-cover-wrap .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.55); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; opacity: 0; transition: opacity 0.2s; border-radius: var(--radius-md); }
  .upload-cover-wrap:hover .overlay { opacity: 1; }
  #cover-input { display: none; }

  .inputs-group { flex: 1; display: flex; flex-direction: column; gap: 16px; }
  .input-field-wrap { display: flex; flex-direction: column; gap: 6px; }
  .input-label { font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
  .custom-input { background: var(--bg-tertiary); border: 1px solid transparent; border-radius: var(--radius-md); padding: 10px 14px; color: #fff; font-family: var(--font); font-size: 14px; outline: none; transition: border-color 0.2s; width: 100%; }
  .custom-input:focus { border-color: var(--accent); }
  .custom-textarea { background: var(--bg-tertiary); border: 1px solid transparent; border-radius: var(--radius-md); padding: 10px 14px; color: #fff; font-family: var(--font); font-size: 13px; outline: none; transition: border-color 0.2s; resize: none; height: 72px; width: 100%; }
  .custom-textarea:focus { border-color: var(--accent); }

  .btn-row { display: flex; justify-content: flex-end; gap: 12px; margin-top: 8px; }
  .btn { padding: 10px 24px; font-size: 13px; font-weight: 700; border-radius: 24px; cursor: pointer; border: none; transition: transform 0.1s, background 0.2s; }
  .btn.cancel { background: transparent; color: #fff; }
  .btn.cancel:hover { background: rgba(255,255,255,0.05); }
  .btn.save { background: var(--accent); color: #000; }
  .btn.save:hover { background: var(--accent-hover); transform: scale(1.02); }
  .btn.save:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Toast */
  .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--accent); color: #000; font-weight: 700; font-size: 13px; padding: 12px 24px; border-radius: 24px; opacity: 0; transition: opacity 0.3s, transform 0.3s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .add-songs-section { border-top: 1px solid var(--border); padding-top: 32px; }
  .section-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .section-subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; }

  /* Added songs list (above search) */
  .added-songs-preview { margin-bottom: 16px; display: none; }
  .added-label { font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .added-song-chip { display: inline-flex; align-items: center; gap: 6px; background: var(--bg-tertiary); border-radius: 20px; padding: 4px 12px 4px 8px; margin: 0 6px 6px 0; font-size: 12px; }
  .added-song-chip i { font-size: 10px; cursor: pointer; color: var(--text-secondary); }
  .added-song-chip i:hover { color: #fff; }

  .inline-search-box { display: flex; align-items: center; gap: 10px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 8px 14px; max-width: 360px; margin-bottom: 20px; }
  .inline-search-box i { color: var(--text-secondary); font-size: 16px; }
  .inline-search-box input { background: transparent; border: none; outline: none; color: #fff; width: 100%; font-size: 13px; }

  .recommend-song-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-radius: var(--radius-md); transition: background 0.15s; margin-bottom: 4px; }
  .recommend-song-item:hover { background: var(--bg-secondary); }
  .song-left-info { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .song-thumb { width: 40px; height: 40px; background: var(--bg-tertiary); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .song-thumb i { color: var(--text-secondary); }
  .song-meta { min-width: 0; }
  .song-meta .name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
  .song-meta .artist { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }
  .song-right-action { display: flex; align-items: center; gap: 16px; }
  .song-album-text { font-size: 13px; color: var(--text-secondary); }
  .add-btn-circle { width: 32px; height: 32px; border: 1px solid var(--text-secondary); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.2s, border-color 0.2s; flex-shrink: 0; }
  .add-btn-circle:hover { border-color: #fff; background: rgba(255,255,255,0.05); }
  .add-btn-circle i { font-size: 14px; color: #fff; }

  .player-bar { grid-column: 1 / 3; background: #0a0a0a; border-top: 1px solid var(--border); display: grid; grid-template-columns: 280px 1fr 220px; align-items: center; padding: 0 24px; }
  .player-left { display: flex; align-items: center; gap: 12px; color: var(--text-secondary); font-size: 12px; }

  .mobile-player { display: none; }
  .bottom-nav { display: none; }

  @media (max-width: 768px) {
    .app { grid-template-columns: 1fr; grid-template-rows: 1fr var(--mobile-nav-height); height: 100vh; }
    .sidebar, .player-bar { display: none; }
    .main { grid-column: 1; grid-row: 1 / 2; padding-bottom: 40px; }
    .main-header { padding: 12px 16px; }
    .form-section { padding: 16px; }
    .playlist-meta-box { flex-direction: column; align-items: center; padding: 16px; gap: 20px; }
    .upload-cover-wrap { width: 140px; height: 140px; }
    .inputs-group { width: 100%; }
    .btn-row { justify-content: stretch; }
    .btn { flex: 1; text-align: center; }
    .inline-search-box { max-width: none; }
    .song-album-text { display: none; }
    .mobile-player { display: flex; align-items: center; position: fixed; bottom: var(--mobile-nav-height); left: 0; right: 0; height: var(--mobile-player-height); background: #1e1e1e; border-top: 1px solid var(--border); padding: 0 14px; gap: 10px; z-index: 100; }
    .mp-progress { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--bg-tertiary); }
    .mp-progress-fill { width: 45%; height: 100%; background: var(--accent); }
    .mp-img { width: 42px; height: 42px; border-radius: var(--radius-sm); background: #2d6a9f; display: flex; align-items: center; justify-content: center; }
    .mp-img i { font-size: 18px; color: #fff; }
    .mp-meta { flex: 1; min-width: 0; }
    .mp-meta .name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mp-meta .artist { font-size: 11px; color: var(--text-secondary); }
    .mp-controls i { font-size: 20px; color: var(--text-primary); }
    .bottom-nav { display: flex; position: fixed; bottom: 0; left: 0; right: 0; height: var(--mobile-nav-height); background: #000; border-top: 1px solid var(--border); z-index: 101; }
    .bn-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; text-decoration: none; color: inherit; }
    .bn-item i { font-size: 22px; color: var(--text-tertiary); }
    .bn-item span { font-size: 10px; color: var(--text-tertiary); }
    .bn-item.active i, .bn-item.active span { color: var(--text-primary); }
  }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon"><i class="ti ti-player-play"></i></div>
      <span class="logo-text">SoundFlow</span>
    </div>
    <nav class="sidebar-nav">
      <a href="soundflow-player.html" class="nav-item"><i class="ti ti-home"></i><span>หน้าแรก</span></a>
      <a href="search.html" class="nav-item"><i class="ti ti-search"></i><span>ค้นหา</span></a>
      <a href="คลังเพลง.html" class="nav-item active"><i class="ti ti-library"></i><span>คลังเพลง</span></a>
    </nav>
  </aside>

  <main class="main">
    <header class="main-header">
      <div class="header-left">สร้างเพลย์ลิสต์</div>
    </header>

    <div class="form-section">
      <div class="playlist-meta-box">

        <!-- Cover Upload -->
        <div class="upload-cover-wrap" id="cover-box" title="คลิกเพื่ออัปโหลดรูปหน้าปก" onclick="document.getElementById('cover-input').click()">
          <i class="ti ti-photo" id="cover-placeholder-icon"></i>
          <span id="cover-placeholder-text">เลือกรูปภาพปก</span>
          <img id="cover-preview" style="display:none;" alt="cover">
          <div class="overlay">
            <i class="ti ti-photo" style="font-size:28px; color:#fff;"></i>
            <span style="font-size:11px; color:#fff;">เปลี่ยนรูปภาพ</span>
          </div>
        </div>
        <input type="file" id="cover-input" accept="image/*">

        <div class="inputs-group">
          <div class="input-field-wrap">
            <label class="input-label">ชื่อเพลย์ลิสต์</label>
            <input type="text" id="playlist-name" class="custom-input" placeholder="เพลย์ลิสต์ของฉัน #1" autocomplete="off">
          </div>
          <div class="input-field-wrap">
            <label class="input-label">คำอธิบาย (ไม่บังคับ)</label>
            <textarea id="playlist-desc" class="custom-textarea" placeholder="เพิ่มคำอธิบายเพลย์ลิสต์ของคุณที่นี่..."></textarea>
          </div>
          <div class="btn-row">
            <button class="btn cancel" onclick="history.back()">ยกเลิก</button>
            <button class="btn save" id="save-btn" onclick="savePlaylist()">สร้างเพลย์ลิสต์</button>
          </div>
        </div>
      </div>

      <div class="add-songs-section">
        <h2 class="section-title">มาเพิ่มเพลงในเพลย์ลิสต์กันเถอะ</h2>
        <p class="section-subtitle">ค้นหาเพลงหรือเลือกจากเพลงแนะนำด้านล่าง</p>

        <!-- Added songs chips -->
        <div class="added-songs-preview" id="added-preview">
          <div class="added-label">เพลงที่เลือก</div>
          <div id="added-chips"></div>
        </div>

        <div class="inline-search-box">
          <i class="ti ti-search"></i>
          <input type="text" id="song-search" placeholder="ค้นหาเพลงเพิ่มเติม..." oninput="filterSongs(this.value)">
        </div>

        <div class="recommend-songs-list" id="songs-list">
          <!-- Songs rendered by JS -->
        </div>
      </div>
    </div>
  </main>

  <footer class="player-bar">
    <div class="player-left">Mini Player Component Placeholder</div>
  </footer>
</div>

<nav class="bottom-nav">
  <a href="index.html" class="bn-item"><i class="ti ti-home"></i><span>หน้าแรก</span></a>
  <a href="ค้นหาเพลง.html" class="bn-item"><i class="ti ti-search"></i><span>ค้นหา</span></a>
  <a href="คลังเพลง.html" class="bn-item active"><i class="ti ti-library"></i><span>คลัง</span></a>
</nav>

<div class="toast" id="toast"></div>

<script>
  const SONGS = [
    { id: 1, name: 'Midnight Rain', artist: 'Gemini Soul', album: 'Chill Vibes Vol.3', color: '#2d6a9f' },
    { id: 2, name: 'ใต้แสงดาว', artist: 'นีลย์ อาทิตย์', album: 'ฤดูฝัน', color: '#c84b31' },
    { id: 3, name: 'Slow Dance', artist: 'Aurora Keys', album: 'Quiet Hours', color: '#5c3d8f' },
    { id: 4, name: 'Golden Hour', artist: 'Gemini Soul', album: 'Sunrise Sessions', color: '#b07d2a' },
    { id: 5, name: 'ลมบ้านนอก', artist: 'ไพเราะ บ้านๆ', album: 'รากเหง้า', color: '#2d7a4f' },
    { id: 6, name: 'Electric Blue', artist: 'NeonWave', album: 'City Lights', color: '#1a5f8c' },
  ];

  let selectedSongIds = new Set();
  let coverDataUrl = null;

  // Cover image upload
  document.getElementById('cover-input').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      coverDataUrl = ev.target.result;
      const img = document.getElementById('cover-preview');
      img.src = coverDataUrl;
      img.style.display = 'block';
      document.getElementById('cover-placeholder-icon').style.display = 'none';
      document.getElementById('cover-placeholder-text').style.display = 'none';
    };
    reader.readAsDataURL(file);
  });

  function renderSongs(list) {
    const container = document.getElementById('songs-list');
    container.innerHTML = '';
    list.forEach(song => {
      const added = selectedSongIds.has(song.id);
      const div = document.createElement('div');
      div.className = 'recommend-song-item';
      div.dataset.songId = song.id;
      div.innerHTML = `
        <div class="song-left-info">
          <div class="song-thumb" style="background:${song.color};"><i class="ti ti-music"></i></div>
          <div class="song-meta">
            <div class="name">${song.name}</div>
            <div class="artist">${song.artist}</div>
          </div>
        </div>
        <div class="song-right-action">
          <span class="song-album-text">${song.album}</span>
          <div class="add-btn-circle" title="${added ? 'นำออก' : 'เพิ่มลงเพลย์ลิสต์'}" onclick="toggleSong(${song.id}, this)" style="${added ? 'border-color:var(--accent);background:var(--accent);' : ''}">
            <i class="ti ${added ? 'ti-check' : 'ti-plus'}" style="${added ? 'color:#000;' : 'color:#fff;'}"></i>
          </div>
        </div>`;
      container.appendChild(div);
    });
  }

  function filterSongs(query) {
    const q = query.toLowerCase();
    const filtered = SONGS.filter(s => s.name.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q));
    renderSongs(filtered);
  }

  function toggleSong(id, btn) {
    if (selectedSongIds.has(id)) {
      selectedSongIds.delete(id);
      btn.style.borderColor = 'var(--text-secondary)';
      btn.style.background = 'transparent';
      btn.querySelector('i').className = 'ti ti-plus';
      btn.querySelector('i').style.color = '#fff';
    } else {
      selectedSongIds.add(id);
      btn.style.borderColor = 'var(--accent)';
      btn.style.background = 'var(--accent)';
      btn.querySelector('i').className = 'ti ti-check';
      btn.querySelector('i').style.color = '#000';
    }
    updateChips();
  }

  function updateChips() {
    const container = document.getElementById('added-chips');
    const preview = document.getElementById('added-preview');
    container.innerHTML = '';
    if (selectedSongIds.size === 0) { preview.style.display = 'none'; return; }
    preview.style.display = 'block';
    selectedSongIds.forEach(id => {
      const song = SONGS.find(s => s.id === id);
      if (!song) return;
      const chip = document.createElement('span');
      chip.className = 'added-song-chip';
      chip.innerHTML = `${song.name} – ${song.artist} <i class="ti ti-x" onclick="removeSong(${id})"></i>`;
      container.appendChild(chip);
    });
  }

  function removeSong(id) {
    selectedSongIds.delete(id);
    // Update button in list too
    const btn = document.querySelector(`.recommend-song-item[data-song-id='${id}'] .add-btn-circle`);
    if (btn) {
      btn.style.borderColor = 'var(--text-secondary)';
      btn.style.background = 'transparent';
      btn.querySelector('i').className = 'ti ti-plus';
      btn.querySelector('i').style.color = '#fff';
    }
    updateChips();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function savePlaylist() {
    const name = document.getElementById('playlist-name').value.trim();
    if (!name) {
      showToast('กรุณาใส่ชื่อเพลย์ลิสต์ก่อนนะ');
      document.getElementById('playlist-name').focus();
      return;
    }
    const desc = document.getElementById('playlist-desc').value.trim();
    const songs = SONGS.filter(s => selectedSongIds.has(s.id));
    const playlist = {
      id: Date.now(),
      name,
      desc,
      cover: coverDataUrl || null,
      songs,
      createdAt: new Date().toISOString(),
    };
    const existing = JSON.parse(localStorage.getItem('sf_playlists') || '[]');
    existing.push(playlist);
    localStorage.setItem('sf_playlists', JSON.stringify(existing));
    showToast(`✓ สร้าง "${name}" แล้ว! กำลังไปคลังเพลง...`);
    setTimeout(() => { window.location.href = 'คลังเพลง.html'; }, 1800);
  }

  // Init
  renderSongs(SONGS);
</script>
</body>
</html>
